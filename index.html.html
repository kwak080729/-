<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>모세관 현상 시뮬레이터</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E14;
    --panel:#121826;
    --panel2:#161D2E;
    --line:#232B3D;
    --text:#E6E9EF;
    --muted:#7C8798;
    --amber:#E8A33D;
    --amber-dim:#3A2F1C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:32px 20px 60px;
  }
  .wrap{max-width:1080px;margin:0 auto;}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:28px;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--muted);font-size:14px;margin:0 0 28px;}
  .formula{
    font-family:'JetBrains Mono',monospace;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 18px;
    font-size:14px;
    margin-bottom:28px;
    color:var(--amber);
    display:flex;
    flex-wrap:wrap;
    gap:8px 20px;
    align-items:center;
  }
  .formula span.label{color:var(--muted);font-size:11px;display:block;font-family:'Inter',sans-serif;}
  .layout{display:grid;grid-template-columns:280px 1fr;gap:24px;}
  @media (max-width:760px){.layout{grid-template-columns:1fr;}}
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
  }
  .panel h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin:0 0 16px;
    font-weight:500;
  }
  .presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
  .preset-btn{
    flex:1;
    min-width:70px;
    background:var(--panel2);
    border:1px solid var(--line);
    color:var(--text);
    padding:9px 4px;
    border-radius:8px;
    font-size:12px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:border-color .15s;
  }
  .preset-btn:hover{border-color:var(--amber);}
  .preset-btn.active{border-color:var(--amber);background:var(--amber-dim);color:var(--amber);}
  .field{margin-bottom:18px;}
  .field label{
    display:flex;justify-content:space-between;
    font-size:12.5px;color:var(--muted);margin-bottom:6px;
  }
  .field label .val{
    font-family:'JetBrains Mono',monospace;
    color:var(--text);
    font-size:12.5px;
  }
  input[type=range]{
    width:100%;
    -webkit-appearance:none;
    height:3px;
    background:var(--line);
    border-radius:2px;
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px;height:14px;
    border-radius:50%;
    background:var(--amber);
    cursor:pointer;
    border:2px solid var(--bg);
  }
  .stage{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .caption{
    font-size:11.5px;
    color:var(--muted);
    margin-top:10px;
    text-align:center;
    line-height:1.6;
  }
  .readouts{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:18px;
    width:100%;
  }
  .ro-card{
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 8px;
    text-align:center;
  }
  .ro-card .r{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .ro-card .h{
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    font-weight:500;
    margin-top:4px;
  }
  .h.rise{color:#38BDF8;}
  .h.fall{color:#E8A33D;}
</style>
</head>
<body>
<div class="wrap">
  <h1>모세관 현상 시뮬레이터</h1>
  <p class="sub">표면장력 · 접촉각 · 밀도 · 중력을 바꾸면서 Jurin의 법칙에 따른 액면 변화를 관찰해보세요.</p>

  <div class="formula" id="formulaBox">
    <div><span class="label">Jurin의 법칙</span>h = 2γcosθ / (ρgr)</div>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>액체 프리셋</h2>
      <div class="presets" id="presets"></div>

      <h2>변수 조절</h2>
      <div class="field">
        <label>표면장력 γ <span class="val" id="gammaVal"></span></label>
        <input type="range" id="gamma" min="10" max="500" step="1">
      </div>
      <div class="field">
        <label>접촉각 θ <span class="val" id="thetaVal"></span></label>
        <input type="range" id="theta" min="0" max="180" step="1">
      </div>
      <div class="field">
        <label>액체 밀도 ρ <span class="val" id="rhoVal"></span></label>
        <input type="range" id="rho" min="500" max="14000" step="10">
      </div>
      <div class="field">
        <label>중력가속도 g <span class="val" id="gVal"></span></label>
        <input type="range" id="gval" min="1.6" max="24.8" step="0.1">
      </div>
    </div>

    <div class="stage">
      <svg id="svg" viewBox="0 0 900 520" width="100%" style="max-width:820px;" role="img">
        <title>모세관 현상 시뮬레이션</title>
        <desc>서로 다른 반지름을 가진 네 개의 유리관에서 표면장력에 의한 액면 상승/하강을 보여주는 시뮬레이션</desc>
      </svg>
      <div class="readouts" id="readouts"></div>
      <p class="caption">시각적 높이는 비교가 쉽도록 압축된 배율로 표시됩니다. 정확한 값은 각 관 아래 mm 수치를 참고하세요.<br>파란색 = 액면 상승(젖음), 주황색 = 액면 하강(비젖음, 예: 수은)</p>
    </div>
  </div>
</div>

<script>
const NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById('svg');

const tubesReal = [0.15, 0.30, 0.50, 0.80];
const tubeX = [220, 400, 580, 760];
const surfaceY = 440;
const tubeTop = 60;
const tubeBottom = 470;

const presets = [
  {name:'물', gamma:72, theta:20, rho:1000, color:'#38BDF8'},
  {name:'에탄올', gamma:22, theta:0, rho:789, color:'#F2C744'},
  {name:'비눗물', gamma:25, theta:0, rho:1000, color:'#9FE1CB'},
  {name:'수은', gamma:486, theta:140, rho:13600, color:'#C7CDD6'}
];

let state = {
  gamma: 72, theta: 20, rho: 1000, g: 9.8,
  liquidColor: '#38BDF8'
};

const tubeState = tubesReal.map(()=>({current:0, velocity:0, target:0}));

function visualRadius(rMM){ return 9 + (rMM/0.8)*22; }

function computeH(rMM){
  const gamma = state.gamma/1000;
  const thetaRad = state.theta*Math.PI/180;
  const r = rMM/1000;
  return (2*gamma*Math.cos(thetaRad)) / (state.rho*state.g*r);
}

function pxFromH(h_m){
  return 130*Math.tanh(h_m*15);
}

function buildSVG(){
  svg.innerHTML = '';

  const defs = document.createElementNS(NS,'defs');
  const grad = document.createElementNS(NS,'linearGradient');
  grad.setAttribute('id','glass');
  grad.setAttribute('x1','0'); grad.setAttribute('x2','1');
  grad.innerHTML = '<stop offset="0" stop-color="#3A4358"/><stop offset="0.5" stop-color="#232B3D"/><stop offset="1" stop-color="#3A4358"/>';
  defs.appendChild(grad);
  svg.appendChild(defs);

  const beaker = document.createElementNS(NS,'path');
  beaker.setAttribute('d','M 130 420 L 170 500 L 730 500 L 770 420');
  beaker.setAttribute('fill','none');
  beaker.setAttribute('stroke','#3A4358');
  beaker.setAttribute('stroke-width','3');
  svg.appendChild(beaker);

  const liquidPool = document.createElementNS(NS,'path');
  liquidPool.setAttribute('id','pool');
  liquidPool.setAttribute('d','M 133 440 L 173 497 L 727 497 L 767 440 Z');
  liquidPool.setAttribute('opacity','0.85');
  svg.appendChild(liquidPool);

  const surfLine = document.createElementNS(NS,'line');
  surfLine.setAttribute('x1','133'); surfLine.setAttribute('x2','767');
  surfLine.setAttribute('y1',surfaceY); surfLine.setAttribute('y2',surfaceY);
  surfLine.setAttribute('stroke','#7C8798');
  surfLine.setAttribute('stroke-width','1');
  surfLine.setAttribute('stroke-dasharray','3 3');
  svg.appendChild(surfLine);

  tubesReal.forEach((rMM, i)=>{
    const cx = tubeX[i];
    const w = visualRadius(rMM);
    const left = cx - w, right = cx + w;

    const glass = document.createElementNS(NS,'rect');
    glass.setAttribute('x', left); glass.setAttribute('y', tubeTop);
    glass.setAttribute('width', w*2); glass.setAttribute('height', tubeBottom-tubeTop);
    glass.setAttribute('rx','4');
    glass.setAttribute('fill','url(#glass)');
    glass.setAttribute('opacity','0.35');
    glass.setAttribute('stroke','#4A5468');
    glass.setAttribute('stroke-width','1.5');
    svg.appendChild(glass);

    const liquid = document.createElementNS(NS,'path');
    liquid.setAttribute('id','liquid-'+i);
    liquid.setAttribute('fill', state.liquidColor);
    svg.appendChild(liquid);

    const label = document.createElementNS(NS,'text');
    label.setAttribute('x', cx); label.setAttribute('y', tubeBottom+22);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('font-family','JetBrains Mono, monospace');
    label.setAttribute('font-size','11');
    label.setAttribute('fill','#7C8798');
    label.textContent = 'r='+rMM+'mm';
    svg.appendChild(label);
  });
}

function updateLiquidPath(i){
  const rMM = tubesReal[i];
  const cx = tubeX[i];
  const w = visualRadius(rMM);
  const left = cx - w, right = cx + w;

  const px = tubeState[i].current;
  let liquidTopY = surfaceY - px;
  liquidTopY = Math.max(tubeTop+10, Math.min(tubeBottom-6, liquidTopY));

  const cosTheta = Math.cos(state.theta*Math.PI/180);
  const amplitude = w*0.5*cosTheta;
  const controlY = liquidTopY + amplitude;

  const d = `M ${left} ${tubeBottom} L ${left} ${liquidTopY} Q ${cx} ${controlY} ${right} ${liquidTopY} L ${right} ${tubeBottom} Z`;
  const el = document.getElementById('liquid-'+i);
  if(el){ el.setAttribute('d', d); el.setAttribute('fill', state.liquidColor); }

  const pool = document.getElementById('pool');
  if(pool) pool.setAttribute('fill', state.liquidColor);
}

function updateReadouts(){
  const container = document.getElementById('readouts');
  container.innerHTML = '';
  tubesReal.forEach((rMM,i)=>{
    const h_m = computeH(rMM);
    const h_mm = h_m*1000;
    const div = document.createElement('div');
    div.className = 'ro-card';
    const sign = h_mm >= 0 ? '+' : '';
    const cls = h_mm >= 0 ? 'rise' : 'fall';
    div.innerHTML = `<div class="r">r = ${rMM} mm</div><div class="h ${cls}">${sign}${h_mm.toFixed(1)} mm</div>`;
    container.appendChild(div);
  });
}

function updateFormula(){
  document.getElementById('gammaVal').textContent = state.gamma + ' mN/m';
  document.getElementById('thetaVal').textContent = state.theta + '\u00b0';
  document.getElementById('rhoVal').textContent = state.rho + ' kg/m\u00b3';
  document.getElementById('gVal').textContent = state.g.toFixed(1) + ' m/s\u00b2';
}

function recomputeTargets(){
  tubesReal.forEach((rMM,i)=>{
    const h_m = computeH(rMM);
    tubeState[i].target = pxFromH(h_m);
  });
}

function animate(){
  tubeState.forEach((t,i)=>{
    const k = 0.06, damping = 0.78;
    const force = (t.target - t.current)*k;
    t.velocity = (t.velocity + force)*damping;
    t.current += t.velocity;
    updateLiquidPath(i);
  });
  requestAnimationFrame(animate);
}

function setPresetActive(name){
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.name===name);
  });
}

function buildPresets(){
  const wrap = document.getElementById('presets');
  presets.forEach(p=>{
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.dataset.name = p.name;
    btn.textContent = p.name;
    btn.onclick = ()=>{
      state.gamma = p.gamma; state.theta = p.theta; state.rho = p.rho; state.liquidColor = p.color;
      document.getElementById('gamma').value = p.gamma;
      document.getElementById('theta').value = p.theta;
      document.getElementById('rho').value = p.rho;
      setPresetActive(p.name);
      onParamsChange();
    };
    wrap.appendChild(btn);
  });
  setPresetActive('물');
}

function onParamsChange(){
  updateFormula();
  updateReadouts();
  recomputeTargets();
}

document.getElementById('gamma').value = state.gamma;
document.getElementById('theta').value = state.theta;
document.getElementById('rho').value = state.rho;
document.getElementById('gval').value = state.g;

document.getElementById('gamma').addEventListener('input', e=>{state.gamma=+e.target.value; setPresetActive(null); onParamsChange();});
document.getElementById('theta').addEventListener('input', e=>{state.theta=+e.target.value; setPresetActive(null); onParamsChange();});
document.getElementById('rho').addEventListener('input', e=>{state.rho=+e.target.value; setPresetActive(null); onParamsChange();});
document.getElementById('gval').addEventListener('input', e=>{state.g=+e.target.value; onParamsChange();});

buildPresets();
buildSVG();
updateFormula();
updateReadouts();
recomputeTargets();
animate();
</script>
</body>
</html>
